services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    ports:
      - "3002:3002"
    environment:
      SERVER_PORT: ${SERVER_PORT:-3002}
      DB_HOST: postgres
      DB_PORT: ${DB_PORT:-5432}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      DB_SSLMODE: ${DB_SSLMODE:-disable}
      ILIACHALLENGE: ${ILIACHALLENGE}
      ILIACHALLENGE_INTERNAL: ${ILIACHALLENGE_INTERNAL}
      WALLET_BASE_URL: ${WALLET_BASE_URL:-http://ilia-wallet:3001}
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
